[pytest]
# Pytest configuration for Data Explorer

# Test discovery
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output options
addopts = 
    -v
    --tb=short
    --strict-markers
    --disable-warnings
    --cov=src
    --cov-report=term-missing
    --cov-report=html:htmlcov
    --cov-fail-under=20

# Markers
markers =
    unit: Unit tests for individual modules
    integration: Integration tests across modules
    slow: Tests that take more than 1 second
    database: Tests that use database operations
    api: Tests that interact with external APIs

# Coverage options
[coverage:run]
source = src
omit = 
    */tests/*
    */__init__.py
    */theme.py

[coverage:report]
precision = 2
show_missing = True
skip_covered = False

[coverage:html]
directory = htmlcov
