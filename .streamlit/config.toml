[server]
# Default port; ./hub may use 8501..8501+50 if busy
port = 8501
headless = false
runOnSave = false
enableCORS = true
enableXsrfProtection = true
# Increase message size limit for large NIfTI files (in MB)
maxMessageSize = 3000

[browser]
# Automatically open browser on launch
gatherUsageStats = false
serverAddress = "localhost"

[theme]
# Theme configuration (overridden by custom CSS in app)
primaryColor = "#002d72"
backgroundColor = "#ffffff"
secondaryBackgroundColor = "#f0f2f6"
textColor = "#262730"
font = "sans serif"

[client]
# Show error details
showErrorDetails = true
toolbarMode = "minimal"
